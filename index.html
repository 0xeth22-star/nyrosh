<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #0d0d0d;
    --card:      #161616;
    --card-hover:#1e1e1e;
    --border:    #2a2a2a;
    --border-hi: #444;
    --text:      #f0f0f0;
    --text-sub:  #999;
    --text-dim:  #555;
    --tag-bg:    #1e1e1e;
    --green:     #4ade80;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    line-height: 1.6;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(13,13,13,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 48px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-logo {
    font-weight: 700;
    font-size: 17px;
    color: var(--text);
    text-decoration: none;
    letter-spacing: -0.3px;
  }

  .nav-logo span { color: var(--green); }

  .nav-links { display: flex; gap: 8px; list-style: none; }

  .nav-links a {
    color: var(--text-sub);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 6px;
    transition: all 0.15s;
  }

  .nav-links a:hover { color: var(--text); background: var(--card); }

  .nav-cta {
    background: var(--text) !important;
    color: var(--bg) !important;
    font-weight: 600 !important;
  }
  .nav-cta:hover { background: #ccc !important; }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding: 100px 48px 60px;
  }

  .hero-inner { max-width: 760px; }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px 6px 10px;
    font-size: 13px;
    color: var(--text-sub);
    margin-bottom: 32px;
    animation: fadeUp 0.5s 0.1s both;
  }

  .hero-badge-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
  }

  .hero-title {
    font-size: clamp(44px, 7vw, 80px);
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -2px;
    color: var(--text);
    margin-bottom: 24px;
    animation: fadeUp 0.5s 0.2s both;
  }

  .hero-title .dim { color: var(--text-dim); }

  .hero-desc {
    font-size: 17px;
    color: var(--text-sub);
    max-width: 520px;
    line-height: 1.75;
    margin-bottom: 40px;
    animation: fadeUp 0.5s 0.3s both;
  }

  .hero-btns {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    animation: fadeUp 0.5s 0.4s both;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 22px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    border-radius: 8px;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
  }

  .btn-primary { background: var(--text); color: var(--bg); }
  .btn-primary:hover { background: #d0d0d0; }

  .btn-outline {
    background: transparent;
    color: var(--text-sub);
    border: 1px solid var(--border);
  }
  .btn-outline:hover {
    border-color: var(--border-hi);
    color: var(--text);
    background: var(--card);
  }

  /* STATS BAR */
  .stats-bar {
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 28px 48px;
    display: flex;
    gap: 48px;
    flex-wrap: wrap;
  }

  .stat { display: flex; flex-direction: column; gap: 4px; }

  .stat-num {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -1px;
    line-height: 1;
  }

  .stat-label {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* SECTIONS */
  .section {
    padding: 80px 48px;
    max-width: 1160px;
    margin: 0 auto;
  }

  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 40px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .section-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .section-sub {
    font-size: 13px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }

  /* PROJECTS GRID */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
    display: flex;
    flex-direction: column;
  }

  .card:hover { border-color: var(--border-hi); transform: translateY(-2px); }

  .card-media {
    width: 100%;
    aspect-ratio: 16/9;
    background: #111;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-media img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-media iframe { width: 100%; height: 100%; border: none; display: block; }

  .card-media-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
      45deg,
      #111 0px, #111 20px,
      #141414 20px, #141414 40px
    );
  }

  .placeholder-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    background: var(--bg);
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
  }

  .placeholder-num {
    font-size: 52px;
    font-weight: 700;
    color: #1e1e1e;
    letter-spacing: -2px;
    line-height: 1;
  }

  .card-status {
    position: absolute;
    top: 12px; right: 12px;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .status-live {
    background: rgba(74,222,128,0.15);
    color: var(--green);
    border: 1px solid rgba(74,222,128,0.3);
  }

  .status-wip {
    background: rgba(255,200,50,0.1);
    color: #f0b429;
    border: 1px solid rgba(255,200,50,0.2);
  }

  .card-body {
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
  }

  .card-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .card-desc {
    font-size: 14px;
    color: var(--text-sub);
    line-height: 1.65;
    flex: 1;
  }

  .card-tags { display: flex; flex-wrap: wrap; gap: 6px; }

  .tag {
    font-size: 12px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 6px;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    color: var(--text-sub);
  }

  .card-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }

  .card-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-sub);
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    transition: all 0.15s;
  }

  .card-link:hover { color: var(--text); border-color: var(--border-hi); }

  .card-link-primary {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  .card-link-primary:hover { background: #d0d0d0; border-color: #d0d0d0; color: var(--bg); }

  /* STACK */
  .stack-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
  }

  .stack-pill {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-sub);
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.15s;
    cursor: default;
  }

  .stack-pill:hover { border-color: var(--border-hi); color: var(--text); background: var(--card-hover); }

  .stack-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .stack-pill:hover .stack-dot { background: var(--green); }

  /* CONTACT */
  .contact-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 56px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    align-items: center;
  }

  .contact-left h2 {
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 700;
    letter-spacing: -1.5px;
    line-height: 1.1;
    margin-bottom: 16px;
  }

  .contact-left p { color: var(--text-sub); font-size: 15px; line-height: 1.7; }

  .contact-right { display: flex; flex-direction: column; gap: 12px; }

  .contact-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    text-decoration: none;
    transition: all 0.15s;
    gap: 12px;
  }

  .contact-item:hover { border-color: var(--border-hi); background: #111; }

  .contact-item-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    font-weight: 500;
    margin-bottom: 3px;
  }

  .contact-item-value { font-size: 14px; font-weight: 600; color: var(--text); }
  .contact-arrow { color: var(--text-dim); font-size: 16px; flex-shrink: 0; }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 24px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    font-size: 13px;
    color: var(--text-dim);
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .reveal {
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .reveal.visible { opacity: 1; transform: none; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    nav { padding: 0 20px; }
    .hero { padding: 90px 20px 48px; }
    .stats-bar { padding: 24px 20px; gap: 32px; }
    .section { padding: 60px 20px; }
    .contact-card { grid-template-columns: 1fr; padding: 32px 24px; }
    footer { padding: 20px; }
    .nav-links { display: none; }
  }

  @media (max-width: 480px) {
    .projects-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

      live:   null,

    {

      desc:   "Gaming landing page with embedded form flow. Built post-launch for an active game project.",

<!-- ============================================= -->

<nav>
  <a class="nav-logo" href="#" id="nav-handle"></a>
  <ul class="nav-links">
    <li><a href="#work">Work</a></li>
    <li><a href="#stack">Stack</a></li>
    <li><a href="#contact" class="nav-cta">Hire Me</a></li>
  </ul>
</nav>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-badge"><div class="hero-badge-dot"></div><span id="hero-role"></span></div>
    <h1 class="hero-title" id="hero-title"></h1>
    <p class="hero-desc" id="hero-desc"></p>
    <div class="hero-btns">
      <a href="#work" class="btn btn-primary">View Projects</a>
      <a href="#contact" class="btn btn-outline">Get in Touch</a>
    </div>
  </div>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="section reveal" id="work">
  <div class="section-header">
    <div class="section-title">Projects</div>
    <div class="section-sub" id="project-count"></div>
  </div>
  <div class="projects-grid" id="projects-grid"></div>
</div>

<div class="section reveal" id="stack">
  <div class="section-header">
    <div class="section-title">Tech Stack</div>
    <div class="section-sub">what i build with</div>
  </div>
  <div class="stack-grid" id="stack-grid"></div>
</div>

<div class="section reveal" id="contact">
  <div class="section-header"><div class="section-title">Contact</div></div>
  <div class="contact-card">
    <div class="contact-left">
      <h2>Let's build<br/>together.</h2>
      <p>Open to freelance gigs, collabs, and long-term projects in web3 and gaming.</p>
    </div>
    <div class="contact-right" id="contact-links"></div>
  </div>
</div>

<footer>
  <span id="footer-left"></span>
  <span>Built with plain HTML · GitHub Pages</span>
</footer>

<script>
// Nav
const h = document.getElementById('nav-handle');
h.innerHTML = '<span>@</span>' + CONFIG.handle.replace('@','');

// Hero
document.getElementById('hero-role').textContent = CONFIG.role;
document.getElementById('hero-title').innerHTML =
  CONFIG.handle.replace('@','') + '<br/><span class="dim">' + CONFIG.role + '</span>';
document.getElementById('hero-desc').textContent = CONFIG.bio;

// Stats
const sb = document.getElementById('stats-bar');
CONFIG.stats.forEach(s => {
  sb.innerHTML += `<div class="stat"><div class="stat-num">${s.num}</div><div class="stat-label">${s.label}</div></div>`;
});

// Projects
document.getElementById('project-count').textContent = CONFIG.projects.length + ' projects';
const pg = document.getElementById('projects-grid');

CONFIG.projects.forEach(p => {
  let media = '';
  if (p.video) {
    media = `<iframe src="${p.video}" allowfullscreen loading="lazy"></iframe>`;
  } else if (p.image) {
    media = `<img src="${p.image}" alt="${p.title}" loading="lazy"/>`;
  } else {
    media = `<div class="card-media-placeholder">
      <div class="placeholder-num">${p.number}</div>
      <div class="placeholder-label">Preview coming soon</div>
    </div>`;
  }

  const badge = p.status === 'live'
    ? `<div class="card-status status-live">● Live</div>`
    : p.status === 'wip'
    ? `<div class="card-status status-wip">● In Progress</div>`
    : '';

  let links = '';
  if (p.live) links += `<a class="card-link card-link-primary" href="${p.live}" target="_blank">↗ View Live</a>`;
  if (p.repo) links += `<a class="card-link" href="${p.repo}" target="_blank">⌥ Source</a>`;
  if (!p.live && !p.repo) links = `<span class="card-link" style="opacity:0.35;pointer-events:none;cursor:default">Links coming soon</span>`;

  pg.innerHTML += `
    <div class="card">
      <div class="card-media">${media}${badge}</div>
      <div class="card-body">
        <div class="card-title">${p.title}</div>
        <div class="card-desc">${p.desc}</div>
        <div class="card-tags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
      <div class="card-footer">${links}</div>
    </div>`;
});

// Stack
const sg = document.getElementById('stack-grid');
CONFIG.stack.forEach(s => {
  sg.innerHTML += `<div class="stack-pill"><div class="stack-dot"></div>${s}</div>`;
});

// Contact
const cl = document.getElementById('contact-links');
cl.innerHTML += `
  <a class="contact-item" href="mailto:${CONFIG.email}">
    <div><div class="contact-item-label">Email</div><div class="contact-item-value">${CONFIG.email}</div></div>
    <div class="contact-arrow">↗</div>
  </a>`;
if (CONFIG.github) cl.innerHTML += `
  <a class="contact-item" href="${CONFIG.github}" target="_blank">
    <div><div class="contact-item-label">GitHub</div><div class="contact-item-value">${CONFIG.github.replace('https://github.com/','@')}</div></div>
    <div class="contact-arrow">↗</div>
  </a>`;
if (CONFIG.twitter) cl.innerHTML += `
  <a class="contact-item" href="${CONFIG.twitter}" target="_blank">
    <div><div class="contact-item-label">Twitter / X</div><div class="contact-item-value">${CONFIG.twitter.replace('https://twitter.com/','@')}</div></div>
    <div class="contact-arrow">↗</div>
  </a>`;

document.getElementById('footer-left').textContent = `${CONFIG.handle} © ${new Date().getFullYear()}`;

// Scroll reveal
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.08 });
document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
</script>
</body>
</html>
