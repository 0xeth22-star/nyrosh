<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  /* ============================================
     CONFIG — edit these CSS vars to rebrand fast
     ============================================ */
  :root {
    --bg:       #0a0a0a;
    --surface:  #111111;
    --border:   #1e1e1e;
    --white:    #f5f5f0;
    --muted:    #555;
    --accent:   #e8e8e0;
    --tag-bg:   #181818;
    --font-display: 'Syne', sans-serif;
    --font-mono:    'DM Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.6;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* ---- NOISE OVERLAY ---- */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* ---- NAV ---- */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,10,0.85);
    backdrop-filter: blur(12px);
  }

  .nav-handle {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.5px;
    color: var(--white);
    text-decoration: none;
  }

  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }

  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--white); }

  /* ---- HERO ---- */
  .hero {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 120px 40px 80px;
    position: relative;
  }

  .hero-inner {
    max-width: 900px;
    width: 100%;
  }

  .hero-tag {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 4px 12px;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.6s 0.2s forwards;
  }

  .hero-name {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: clamp(52px, 9vw, 110px);
    line-height: 0.92;
    letter-spacing: -3px;
    color: var(--white);
    opacity: 0;
    animation: fadeUp 0.6s 0.35s forwards;
    margin-bottom: 28px;
  }

  .hero-name span {
    color: transparent;
    -webkit-text-stroke: 1px var(--muted);
  }

  .hero-bio {
    max-width: 480px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.8;
    opacity: 0;
    animation: fadeUp 0.6s 0.5s forwards;
    margin-bottom: 48px;
  }

  .hero-cta {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    opacity: 0;
    animation: fadeUp 0.6s 0.65s forwards;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: var(--white);
  }

  .btn:hover {
    background: var(--white);
    color: var(--bg);
    border-color: var(--white);
  }

  .btn-ghost { color: var(--muted); }
  .btn-ghost:hover { color: var(--bg); }

  /* ---- HORIZONTAL TICKER ---- */
  .ticker-wrap {
    overflow: hidden;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 14px 0;
    margin-bottom: 0;
    white-space: nowrap;
  }

  .ticker-track {
    display: inline-flex;
    animation: ticker 22s linear infinite;
  }

  .ticker-item {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 56px;
  }

  .ticker-item span { color: var(--white); margin-right: 56px; }

  @keyframes ticker {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  /* ---- SECTION ---- */
  section {
    padding: 100px 40px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .section-label {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 56px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ---- PROJECT GRID ---- */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .project-card {
    background: var(--bg);
    padding: 36px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    transition: background 0.2s;
    position: relative;
    overflow: hidden;
  }

  .project-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--white), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .project-card:hover { background: var(--surface); }
  .project-card:hover::before { opacity: 1; }

  .project-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .project-thumb-inner {
    font-family: var(--font-display);
    font-size: 48px;
    font-weight: 800;
    color: var(--border);
    letter-spacing: -2px;
    user-select: none;
    transition: color 0.3s;
  }

  .project-card:hover .project-thumb-inner {
    color: #222;
  }

  /* Animated grid bg on thumb */
  .project-thumb::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 24px 24px;
    opacity: 0.5;
  }

  .project-number {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.15em;
  }

  .project-title {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    color: var(--white);
    line-height: 1.2;
  }

  .project-desc {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.7;
    flex: 1;
  }

  .project-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tag {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 10px;
    border: 1px solid var(--border);
    color: var(--muted);
    background: var(--tag-bg);
  }

  .project-links {
    display: flex;
    gap: 12px;
    margin-top: 4px;
  }

  .project-link {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color 0.2s;
  }

  .project-link:hover { color: var(--white); }
  .project-link svg { width: 12px; height: 12px; }

  /* ---- STACK ---- */
  .stack-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .stack-item {
    background: var(--bg);
    padding: 20px 24px;
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .stack-item:hover { background: var(--surface); color: var(--white); }

  .stack-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .stack-item:hover .stack-dot { background: var(--white); }

  /* ---- CONTACT ---- */
  .contact-block {
    border: 1px solid var(--border);
    padding: 64px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 32px;
    position: relative;
    overflow: hidden;
  }

  .contact-block::before {
    content: 'HIRE';
    position: absolute;
    right: -20px;
    top: 50%;
    transform: translateY(-50%) rotate(90deg);
    font-family: var(--font-display);
    font-size: 120px;
    font-weight: 800;
    color: var(--surface);
    pointer-events: none;
    letter-spacing: -4px;
    line-height: 1;
  }

  .contact-heading {
    font-family: var(--font-display);
    font-size: clamp(32px, 5vw, 56px);
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -2px;
  }

  .contact-heading span { color: transparent; -webkit-text-stroke: 1px var(--muted); }

  .contact-email {
    font-size: 13px;
    color: var(--muted);
    text-decoration: none;
    border-bottom: 1px solid var(--border);
    padding-bottom: 2px;
    transition: color 0.2s, border-color 0.2s;
    letter-spacing: 0.05em;
  }

  .contact-email:hover { color: var(--white); border-color: var(--white); }

  .contact-socials {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  /* ---- FOOTER ---- */
  footer {
    border-top: 1px solid var(--border);
    padding: 24px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.1em;
    flex-wrap: wrap;
    gap: 12px;
  }

  /* ---- ANIMATIONS ---- */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .reveal {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ---- MOBILE ---- */
  @media (max-width: 640px) {
    nav { padding: 16px 20px; }
    .hero { padding: 100px 20px 60px; }
    section { padding: 70px 20px; }
    .contact-block { padding: 36px 24px; }
    footer { padding: 20px; }
    .nav-links { display: none; }
  }
</style>
</head>
<body>

<!-- =============================================
     ⚙️  CONFIGURE YOUR PORTFOLIO HERE
     ============================================= -->
<script>
const CONFIG = {
  handle:   "@yourhandle",       // ← your handle/name
  tagline:  "Full Stack Dev",    // ← one-liner role
  bio:      "Building on the frontier — web3, games, and everything in between. I turn ideas into live products.",
  email:    "you@email.com",     // ← your email
  github:   "https://github.com/yourhandle",
  twitter:  "https://twitter.com/yourhandle",

  projects: [
    {
      number: "01",
      title:  "Minting Bot Website",
      desc:   "Frontend interface for an automated NFT minting bot. Wallet integration, real-time status, transaction feedback.",
      tags:   ["Web3", "NFT", "Wallet Connect"],
      live:   null,              // ← add URL when live
      repo:   null,              // ← add GitHub repo URL
    },
    {
      number: "02",
      title:  "NFT Project Form Site",
      desc:   "Data collection and onboarding site built for a live NFT project. Clean UX, validation, team collab.",
      tags:   ["Web3", "Form", "NFT"],
      live:   null,
      repo:   null,
    },
    {
      number: "03",
      title:  "Game Site + Form",
      desc:   "Combined gaming landing page with embedded form flow. Built for an active game project post-launch.",
      tags:   ["Gaming", "Form", "Full Stack"],
      live:   null,
      repo:   null,
    },
  ],

  stack: [
    "React", "Next.js", "Node.js", "TypeScript",
    "Solidity", "Ethers.js", "wagmi", "Web3.js",
    "PostgreSQL", "MongoDB", "REST APIs", "GraphQL",
    "Tailwind CSS", "Git / GitHub", "Docker", "Figma",
  ],
};
</script>
<!-- ============================================= -->

<!-- NAV -->
<nav>
  <a class="nav-handle" href="#" id="nav-handle"></a>
  <ul class="nav-links">
    <li><a href="#work">Work</a></li>
    <li><a href="#stack">Stack</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-tag" id="hero-tag"></div>
    <h1 class="hero-name" id="hero-name"></h1>
    <p class="hero-bio" id="hero-bio"></p>
    <div class="hero-cta">
      <a href="#work" class="btn">View Work</a>
      <a href="#contact" class="btn btn-ghost">Get in Touch</a>
    </div>
  </div>
</div>

<!-- TICKER -->
<div class="ticker-wrap">
  <div class="ticker-track" id="ticker"></div>
</div>

<!-- WORK -->
<section id="work">
  <div class="section-label reveal">Selected Work</div>
  <div class="projects-grid reveal" id="projects-grid"></div>
</section>

<!-- STACK -->
<section id="stack">
  <div class="section-label reveal">Tech Stack</div>
  <div class="stack-grid reveal" id="stack-grid"></div>
</section>

<!-- CONTACT -->
<section id="contact">
  <div class="section-label reveal">Contact</div>
  <div class="contact-block reveal">
    <div class="contact-heading">
      Let's build<br/><span>something.</span>
    </div>
    <a class="contact-email" id="contact-email" href="#"></a>
    <div class="contact-socials" id="contact-socials"></div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <span id="footer-handle"></span>
  <span id="footer-year"></span>
</footer>

<script>
// ---- RENDER FROM CONFIG ----
document.getElementById('nav-handle').textContent    = CONFIG.handle;
document.getElementById('hero-tag').textContent      = CONFIG.tagline;
document.getElementById('hero-bio').textContent      = CONFIG.bio;
document.getElementById('footer-handle').textContent = CONFIG.handle;
document.getElementById('footer-year').textContent   = `© ${new Date().getFullYear()}`;

// Hero name (split handle into outline + solid effect)
const nameParts = CONFIG.handle.replace('@','').split('');
const mid = Math.floor(nameParts.length / 2);
document.getElementById('hero-name').innerHTML =
  nameParts.slice(0, mid).join('') +
  `<span>${nameParts.slice(mid).join('')}</span>`;

// Ticker
const tickerItems = ["Web3", "Full Stack", "NFT", "Gaming", "Solidity", "React", "Node.js", "Open to Work"];
const tickerTrack  = document.getElementById('ticker');
const repeated     = [...tickerItems, ...tickerItems]; // duplicate for seamless loop
tickerTrack.innerHTML = repeated.map(t =>
  `<span class="ticker-item"><span>${t}</span></span>`
).join('');

// Projects
const grid = document.getElementById('projects-grid');
CONFIG.projects.forEach(p => {
  const liveBtn = p.live
    ? `<a class="project-link" href="${p.live}" target="_blank">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>
        Live
       </a>`
    : `<span class="project-link" style="opacity:0.3;cursor:default">— Soon</span>`;

  const repoBtn = p.repo
    ? `<a class="project-link" href="${p.repo}" target="_blank">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/></svg>
        Repo
       </a>`
    : '';

  grid.innerHTML += `
    <div class="project-card">
      <div class="project-thumb">
        <div class="project-thumb-inner">${p.number}</div>
      </div>
      <div class="project-number">${p.number} / 0${CONFIG.projects.length}</div>
      <div class="project-title">${p.title}</div>
      <div class="project-desc">${p.desc}</div>
      <div class="project-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      <div class="project-links">${liveBtn}${repoBtn}</div>
    </div>`;
});

// Stack
const stackGrid = document.getElementById('stack-grid');
CONFIG.stack.forEach(s => {
  stackGrid.innerHTML += `
    <div class="stack-item">
      <div class="stack-dot"></div>${s}
    </div>`;
});

// Contact
document.getElementById('contact-email').textContent = CONFIG.email;
document.getElementById('contact-email').href        = `mailto:${CONFIG.email}`;

const socials = document.getElementById('contact-socials');
if (CONFIG.github)  socials.innerHTML += `<a href="${CONFIG.github}"  target="_blank" class="btn btn-ghost">GitHub</a>`;
if (CONFIG.twitter) socials.innerHTML += `<a href="${CONFIG.twitter}" target="_blank" class="btn btn-ghost">Twitter / X</a>`;

// ---- SCROLL REVEAL ----
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('visible'); }
  });
}, { threshold: 0.1 });

document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
</body>
</html>
